{% extends "base.html" %}

{% block title %}Sign Up - PPG Members Portal{% endblock %}

{% block content %}
<h1>Create Account</h1>
<p>
  You can sign up only if your email is listed in the PPG member directory.
</p>

<form method="post" action="{% url 'account_signup' %}">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Create account</button>
</form>

<p>
  Already have an account?
  <a href="{% url 'account_login' %}">Log in</a>.
</p>
{% endblock %}
