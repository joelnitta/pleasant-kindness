{% extends "base.html" %}

{% block title %}Reset Password — PPG Members Portal{% endblock %}

{% block content %}
<h1>Reset Password</h1>
<p>Enter your account email and we will send a reset link.</p>

<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Send reset link</button>
</form>
{% endblock %}
