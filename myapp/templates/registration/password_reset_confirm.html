{% extends "base.html" %}

{% block title %}Set New Password — PPG Members Portal{% endblock %}

{% block content %}
<h1>Set New Password</h1>

{% if validlink %}
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Save password</button>
</form>
{% else %}
<p>
  This password reset link is invalid or expired. Please request a new one.
</p>
{% endif %}
{% endblock %}
